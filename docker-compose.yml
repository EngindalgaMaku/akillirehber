# Production mode with multiple workers for backend
# For development with frontend in Docker, use: docker-compose -f docker-compose.dev.yml up -d

services:
  # ===========================================
  # Backend Service - FastAPI
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpassword}@postgres:5432/${POSTGRES_DB:-ragchatbot}
      - WEAVIATE_URL=http://weaviate:8080
      - RAGAS_URL=http://rag-ragas:8001
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDEGG_API_KEY=${CLAUDEGG_API_KEY:-}
      - APICLAUDEGG_API_KEY=${APICLAUDEGG_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      # Worker configuration for production
      - WORKERS=${WORKERS:-4}
      - THREADS=${THREADS:-4}
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-1000}
      - MAX_REQUESTS=${MAX_REQUESTS:-1000}
      - MAX_REQUESTS_JITTER=${MAX_REQUESTS_JITTER:-100}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-300}
      - GUNICORN_KEEPALIVE=${GUNICORN_KEEPALIVE:-5}
      - GUNICORN_GRACEFUL_TIMEOUT=${GUNICORN_GRACEFUL_TIMEOUT:-30}
      - GUNICORN_BIND=${GUNICORN_BIND:-0.0.0.0:8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Numba cache directory for UMAP (required by Giskard)
      - NUMBA_CACHE_DIR=/tmp/numba_cache
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragchatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragchatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Weaviate Vector Database
  # ===========================================
  weaviate:
    image: semitechnologies/weaviate:1.35.3
    container_name: rag-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=
      - CLUSTER_HOSTNAME=node1
      - LOG_LEVEL=info
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================
  # RAGAS Evaluation Service
  # ===========================================
  ragas:
    build:
      context: ./ragas_service
      dockerfile: Dockerfile
    container_name: rag-ragas
    ports:
      - "8001:8001"
    environment:
      # LLM Provider API Keys
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDEGG_API_KEY=${CLAUDEGG_API_KEY:-}
      - APICLAUDEGG_API_KEY=${APICLAUDEGG_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      # Optional: Force specific provider (groq, openrouter, openai, claudegg, apiclaudegg, deepseek, cohere, alibaba, zai)
      - RAGAS_PROVIDER=${RAGAS_PROVIDER:-}
      # Optional: Override default model
      - RAGAS_MODEL=${RAGAS_MODEL:-}
    volumes:
      - ./ragas_service:/app:ro
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  rag-network:
    driver: bridge
    name: rag-educational-network

volumes:
  postgres_data:
    name: rag-postgres-data
  weaviate_data:
    name: rag-weaviate-data
